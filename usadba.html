<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Усадьба — навигатор по Подмосковью</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=PT+Serif:wght@400;700&family=Inter:wght@400;500;600&display=swap">
<link rel="stylesheet" href="style.css">
<style>
  nav.back {
    max-width: 1000px;
    margin: 0 auto;
    padding: 24px 24px 0;
  }
  nav.back a {
    font-size: 13px;
    color: var(--ink-soft);
    text-decoration: none;
  }
  nav.back a:hover { color: var(--brick); }

  .detail-hero {
    max-width: 1000px;
    margin: 0 auto;
    padding: 20px 24px 0;
  }
  .detail-hero .meta { font-size: 13px; color: var(--ink-soft); margin: 8px 0 0; }
  .detail-hero h1 { font-size: 34px; margin: 10px 0 0; text-align: left; }

  .photo-banner {
    max-width: 1000px;
    margin: 24px auto 0;
    padding: 0 24px;
  }
  .photo-banner .box {
    position: relative;
    height: 320px;
    background: var(--paper-deep);
    border: 1px solid var(--line);
    border-radius: 4px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-soft);
    font-size: 13px;
  }
  .photo-banner .box img {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover;
  }
  .photo-banner .credit {
    font-size: 11px;
    color: var(--ink-soft);
    text-align: right;
    margin: 6px 2px 0;
  }

  .detail {
    max-width: 1000px;
    margin: 0 auto;
    padding: 28px 24px 10px;
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 32px;
  }
  .detail h2 {
    font-family: 'PT Serif', serif;
    font-size: 19px;
    color: var(--moss-deep);
    margin: 26px 0 10px;
  }
  .detail h2:first-child { margin-top: 0; }
  .detail p {
    font-size: 14.5px;
    line-height: 1.75;
    margin: 0 0 4px;
  }

  .sidebar .box {
    background: var(--paper-deep);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 18px 20px;
    margin-bottom: 16px;
  }
  .sidebar .box h3 {
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--brick);
    margin: 0 0 8px;
    font-weight: 600;
  }
  .sidebar .box p {
    font-size: 13.5px;
    line-height: 1.6;
    margin: 0;
    color: var(--ink);
  }
  .sidebar .box p.note {
    color: var(--ink-soft);
    font-size: 12.5px;
    margin-top: 8px;
  }
  .sidebar .box a.map-link {
    display: inline-block;
    margin-top: 10px;
    font-size: 13px;
    font-weight: 600;
    color: var(--brick);
    text-decoration: none;
  }
  .sidebar .box a.map-link:hover { text-decoration: underline; }

  .related {
    max-width: 1000px;
    margin: 20px auto 0;
    padding: 20px 24px 10px;
  }
  .related h2 {
    font-family: 'PT Serif', serif;
    font-size: 19px;
    color: var(--moss-deep);
    margin: 0 0 16px;
  }
  .related .row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
  }

  @media (max-width: 720px) {
    .detail { grid-template-columns: 1fr; }
  }

  @media (max-width: 640px) {
    .detail-hero h1 { font-size: 26px; }
    .photo-banner .box { height: 200px; }
  }
</style>
</head>
<body>
<a href="#content" class="skip-link">Перейти к содержимому</a>

<nav class="back"><a href="index.html">← Все усадьбы</a> · <a href="marshruty.html">Маршруты →</a></nav>

<div id="content"></div>

<footer>Навигатор по усадьбам Москвы и области · в разработке</footer>

<script>
  const accessNames = { "свободный": "Свободный вход", "билет": "По билету", "снаружи": "Только снаружи", "закрыт": "Закрыт" };
  const checkIcon = `<svg viewBox="0 0 24 24"><polyline points="4 13 9 18 20 6"/></svg>`;
  const starIcon = `<svg viewBox="0 0 24 24"><polygon points="12 2 15 9 22 9.5 17 14.5 18.5 22 12 18 5.5 22 7 14.5 2 9.5 9 9"/></svg>`;
  let visited = new Set(JSON.parse(localStorage.getItem("visitedEstates") || "[]"));
  let favorites = new Set(JSON.parse(localStorage.getItem("favoriteEstates") || "[]"));
  const params = new URLSearchParams(location.search);
  const slug = params.get("slug");

  Promise.all([
    fetch("estates.json").then(r => r.json()),
    fetch("routes.json").then(r => r.json()).catch(() => [])
  ])
    .then(([data, routes]) => {
      const e = data.find(x => x.slug === slug);
      const content = document.getElementById("content");

      if (!e) {
        content.innerHTML = `
          <div class="wrap" style="padding-top:40px;">
            <p>Такая усадьба не найдена. <a href="index.html" style="color:var(--brick);">Вернуться к списку →</a></p>
          </div>`;
        return;
      }

      document.title = e.name + " — навигатор по Подмосковью";

      const myRoute = routes.find(r => r.estates.includes(e.slug));
      const routeHtml = myRoute ? `
            <div class="box">
              <h3>Маршрут</h3>
              <p>Входит в «${myRoute.title}»</p>
              <a class="map-link" href="marshruty.html#${myRoute.slug}">Смотреть маршрут →</a>
            </div>` : "";

      const related = (e.related && e.related.length
        ? e.related.map(slug => data.find(x => x.slug === slug)).filter(Boolean)
        : data.filter(x => x.cat === e.cat && x.slug !== e.slug)
      ).slice(0, 3);
      const relatedHtml = related.length ? `
        <section class="related">
          <h2>Похожие места</h2>
          <div class="row">
            ${related.map(r => `
              <a class="card" href="usadba.html?slug=${r.slug}">
                <div class="photo">
                  <img src="images/${r.slug}.jpg" alt="${r.name}" loading="lazy" onerror="this.style.display='none'">
                  <span class="ph-text">фото усадьбы</span>
                </div>
                <div class="body">
                  <p class="cat">${r.cat}</p>
                  <h3>${r.name}</h3>
                  <p class="meta">${r.meta}</p>
                  <p class="teaser">${r.teaser}</p>
                </div>
              </a>
            `).join("")}
          </div>
        </section>` : "";

      content.innerHTML = `
        <header class="detail-hero">
          <div style="display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:12px;">
            <span class="badge">${e.cat}</span>
            <div style="display:flex; gap:8px; flex-wrap:wrap;">
              <button class="fav-btn ${favorites.has(e.slug) ? "faved" : ""}" id="favBtn">${starIcon}<span id="favBtnText">${favorites.has(e.slug) ? "В избранном" : "В избранное"}</span></button>
              <button class="visited-btn ${visited.has(e.slug) ? "visited" : ""}" id="visitBtn">${checkIcon}<span id="visitBtnText">${visited.has(e.slug) ? "Посещено" : "Отметить как посещённое"}</span></button>
            </div>
          </div>
          <h1>${e.name}</h1>
          <p class="meta">${e.meta} · ${e.era}</p>
        </header>

        <div class="photo-banner">
          <div class="box">
            <img src="images/${e.slug}.jpg" alt="${e.name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <span style="display:none;">фото усадьбы</span>
          </div>
          ${e.credit ? `<p class="credit">Фото: ${e.credit}</p>` : ""}
        </div>

        <section class="detail">
          <div class="content-main">
            <h2>История</h2>
            <p>${e.history}</p>
            <h2>Архитектура</h2>
            <p>${e.architecture}</p>
          </div>
          <aside class="sidebar">
            <div class="box">
              <h3>Как добраться</h3>
              <p>${e.getThere}</p>
            </div>
            <div class="box">
              <h3>Доступность</h3>
              <p><span class="access-tag ${e.access}">${accessNames[e.access] || e.access}</span></p>
              <a class="map-link" href="sravnenie.html?a=${e.slug}">Сравнить с другой →</a>
            </div>
            <div class="box">
              <h3>Часы работы и билеты</h3>
              <p>Уточняйте на официальном сайте усадьбы — расписание и цены периодически меняются.</p>
              <a class="map-link" href="index.html">Показать на карте →</a>
            </div>
            ${routeHtml}
          </aside>
        </section>

        ${relatedHtml}
      `;

      document.getElementById("visitBtn").addEventListener("click", () => {
        if (visited.has(e.slug)) visited.delete(e.slug); else visited.add(e.slug);
        localStorage.setItem("visitedEstates", JSON.stringify([...visited]));
        const btn = document.getElementById("visitBtn");
        const isVisited = visited.has(e.slug);
        btn.classList.toggle("visited", isVisited);
        document.getElementById("visitBtnText").textContent = isVisited ? "Посещено" : "Отметить как посещённое";
      });

      document.getElementById("favBtn").addEventListener("click", () => {
        if (favorites.has(e.slug)) favorites.delete(e.slug); else favorites.add(e.slug);
        localStorage.setItem("favoriteEstates", JSON.stringify([...favorites]));
        const btn = document.getElementById("favBtn");
        const isFaved = favorites.has(e.slug);
        btn.classList.toggle("faved", isFaved);
        document.getElementById("favBtnText").textContent = isFaved ? "В избранном" : "В избранное";
      });
    })
    .catch(() => {
      document.getElementById("content").innerHTML = `
        <div class="wrap" style="padding-top:40px;">
          <p style="color:var(--brick);">Не удалось загрузить данные (estates.json). Проверьте, что файл лежит рядом с этой страницей.</p>
        </div>`;
    });
</script>

</body>
</html>
