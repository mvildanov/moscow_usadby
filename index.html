<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Усадьбы Москвы и области — навигатор</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=PT+Serif:wght@400;700&family=Inter:wght@400;500;600&display=swap">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  .map-section {
    display: flex;
    gap: 18px;
    padding: 28px 24px 8px;
    max-width: 1000px;
    margin: 0 auto;
    flex-wrap: wrap;
    align-items: stretch;
  }
  .map-wrap {
    position: relative;
    flex: 1 1 460px;
    min-width: 300px;
    height: 440px;
    background: var(--paper-deep);
    border: 1px solid var(--line);
    border-radius: 4px;
    overflow: hidden;
  }
  #leafletMap { position: absolute; inset: 0; }
  .leaflet-tile { filter: sepia(0.25) saturate(0.75) brightness(1.02); }
  .leaflet-container { font-family: 'Inter', sans-serif; background: var(--paper-deep); }

  .info-panel {
    flex: 1 1 280px;
    min-width: 260px;
    background: var(--paper-deep);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 22px 24px;
    display: flex;
    flex-direction: column;
  }
  .info-panel .badge { margin-bottom: 12px; align-self: flex-start; }
  .info-panel h3 {
    font-family: 'PT Serif', serif;
    font-size: 22px;
    margin: 0 0 6px;
    color: var(--moss-deep);
  }
  .info-panel .meta { font-size: 12px; color: var(--ink-soft); margin: 0 0 14px; }
  .info-panel p.desc { font-size: 14px; line-height: 1.65; margin: 0 0 16px; color: var(--ink); flex: 1; }
  .info-panel .routes { display: flex; gap: 14px; margin-bottom: 14px; }
  .info-panel .routes a {
    font-size: 12px;
    color: var(--moss-deep);
    text-decoration: none;
    border-bottom: 1px dotted var(--moss-deep);
  }
  .info-panel .routes a:hover { color: var(--brick); border-color: var(--brick); }
  .info-panel a.more {
    font-size: 13px;
    font-weight: 600;
    color: var(--brick);
    text-decoration: none;
    align-self: flex-start;
  }
  .info-panel a.more:hover { text-decoration: underline; }

  .filters {
    max-width: 1000px;
    margin: 0 auto;
    padding: 28px 24px 4px;
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    align-items: center;
  }
  input[type="text"] {
    height: 40px;
    flex: 1 1 220px;
    min-width: 180px;
    border-radius: 3px;
    border: 1px solid var(--line);
    background: var(--paper-deep);
    padding: 0 14px;
    font-size: 14px;
    font-family: inherit;
    color: var(--ink);
  }

  main.grid {
    max-width: 1000px;
    margin: 0 auto;
    padding: 20px 24px 70px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 18px;
  }

  @media (max-width: 640px) {
    .map-wrap { height: 340px; }
  }
</style>
</head>
<body>

<header class="hero">
  <p class="eyebrow">Навигатор по Подмосковью</p>
  <h1>Усадьбы Москвы и области</h1>
  <p class="tagline">Дворцы, парки и литературные гнёзда в часе езды от города — с историей каждого места и картой, по которой можно проложить свой маршрут</p>
  <div class="flourish">
    <span></span>
    <svg viewBox="0 0 10 10"><rect x="3" y="3" width="4" height="4" transform="rotate(45 5 5)" fill="#A2472E"/></svg>
    <span></span>
  </div>
</header>

<section class="map-section">
  <div class="map-wrap" id="mapWrap">
    <div id="leafletMap"></div>
  </div>
  <div class="info-panel" id="infoPanel"></div>
</section>

<section class="filters">
  <input type="text" id="search" placeholder="Поиск по названию">
  <div class="chips" id="chips"></div>
</section>

<main class="grid" id="grid"></main>

<footer>Навигатор по усадьбам Москвы и области · в разработке</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  let estates = [];
  let map, markers = [];
  const cats = ["Все", "Дворцы", "Парки", "Литературные", "Редкие"];
  let filter = "Все";
  let query = "";
  let active = 0;

  function matches(e) {
    return (filter === "Все" || e.cat === filter) && e.name.toLowerCase().includes(query.toLowerCase());
  }

  function styleFor(i) {
    const isActive = i === active;
    const ok = matches(estates[i]);
    return {
      radius: isActive ? 10 : 7,
      color: isActive ? "#2C3A24" : "#FFFFFF",
      weight: isActive ? 2 : 1.5,
      fillColor: isActive ? "#C68A2E" : "#A2472E",
      fillOpacity: ok ? 0.9 : 0.2,
      opacity: ok ? 1 : 0.2
    };
  }

  function initMap() {
    map = L.map("leafletMap", { scrollWheelZoom: false });
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: '&copy; OpenStreetMap contributors',
      maxZoom: 18
    }).addTo(map);

    markers = estates.map((e, i) => {
      const m = L.circleMarker([e.lat, e.lng], styleFor(i)).addTo(map);
      m.on("click", () => { active = i; refreshMarkers(); renderPanel(); });
      return m;
    });

    const bounds = L.latLngBounds(estates.map(e => [e.lat, e.lng]));
    map.fitBounds(bounds, { padding: [30, 30] });
  }

  function refreshMarkers() {
    markers.forEach((m, i) => m.setStyle(styleFor(i)));
  }

  function renderPanel() {
    const e = estates[active];
    if (!e) return;
    const yandex = `https://yandex.ru/maps/?rtext=~${e.lat},${e.lng}&rtt=auto`;
    const google = `https://www.google.com/maps/dir/?api=1&destination=${e.lat},${e.lng}`;
    document.getElementById("infoPanel").innerHTML = `
      <span class="badge">${e.cat}</span>
      <h3>${e.name}</h3>
      <p class="meta">${e.meta}</p>
      <p class="desc">${e.teaser}</p>
      <div class="routes">
        <a href="${yandex}" target="_blank" rel="noopener">Маршрут: Яндекс Карты →</a>
        <a href="${google}" target="_blank" rel="noopener">Google Карты →</a>
      </div>
      <a class="more" href="usadba.html?slug=${e.slug}">Читать полностью →</a>
    `;
  }

  function renderChips() {
    document.getElementById("chips").innerHTML = cats.map(c =>
      `<button class="chip ${c === filter ? "active" : ""}" data-c="${c}">${c}</button>`
    ).join("");
    document.querySelectorAll(".chip").forEach(b =>
      b.addEventListener("click", () => { filter = b.dataset.c; renderAll(); })
    );
  }

  function renderGrid() {
    const list = estates.filter(matches);
    document.getElementById("grid").innerHTML = list.map(e => `
      <a class="card" href="usadba.html?slug=${e.slug}">
        <div class="photo">
          <img src="images/${e.slug}.jpg" alt="${e.name}" loading="lazy" onerror="this.style.display='none'">
          <span class="ph-text">фото усадьбы</span>
        </div>
        <div class="body">
          <p class="cat">${e.cat}</p>
          <h3>${e.name}</h3>
          <p class="meta">${e.meta}</p>
          <p class="teaser">${e.teaser}</p>
        </div>
      </a>
    `).join("") || `<p style="color:var(--ink-soft); font-size:14px;">Ничего не найдено</p>`;
  }

  function renderAll() {
    renderChips();
    refreshMarkers();
    renderPanel();
    renderGrid();
  }

  document.getElementById("search").addEventListener("input", e => {
    query = e.target.value;
    renderAll();
  });

  fetch("estates.json")
    .then(r => r.json())
    .then(data => {
      estates = data;
      const params = new URLSearchParams(location.search);
      const focus = params.get("focus");
      const idx = estates.findIndex(e => e.slug === focus);
      if (idx >= 0) active = idx;
      initMap();
      renderAll();
    })
    .catch(() => {
      document.getElementById("grid").innerHTML =
        `<p style="color:var(--brick); font-size:14px;">Не удалось загрузить данные усадеб (estates.json). Проверьте, что файл лежит рядом с index.html.</p>`;
    });
</script>

</body>
</html>
