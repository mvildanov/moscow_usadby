<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Усадьбы Москвы и области — навигатор</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=PT+Serif:wght@400;700&family=Inter:wght@400;500;600&display=swap">
<link rel="stylesheet" href="style.css">
<style>
  .map-section {
    display: flex;
    gap: 18px;
    padding: 28px 24px 8px;
    max-width: 1000px;
    margin: 0 auto;
    flex-wrap: wrap;
    align-items: stretch;
  }
  .map-wrap {
    position: relative;
    flex: 1 1 460px;
    min-width: 300px;
    height: 440px;
    background: var(--paper-deep);
    border: 1px solid var(--line);
    border-radius: 4px;
    overflow: hidden;
  }
  .pin {
    position: absolute;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 14px;
    font-family: 'PT Serif', serif;
  }
  .pin .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--brick);
    border: 1.5px solid var(--paper-deep);
  }
  .pin.active .dot {
    width: 13px;
    height: 13px;
    background: var(--ochre);
    border: 2px solid var(--moss-deep);
  }
  .pin .label {
    font-size: 12px;
    color: var(--moss-deep);
    white-space: nowrap;
    background: rgba(242,234,211,0.85);
    padding: 1px 5px;
    display: none;
  }
  .pin.active .label { display: block; }
  .pin.dim { opacity: 0.3; }

  .info-panel {
    flex: 1 1 280px;
    min-width: 260px;
    background: var(--paper-deep);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 22px 24px;
    display: flex;
    flex-direction: column;
  }
  .info-panel .badge { margin-bottom: 12px; align-self: flex-start; }
  .info-panel h3 {
    font-family: 'PT Serif', serif;
    font-size: 22px;
    margin: 0 0 6px;
    color: var(--moss-deep);
  }
  .info-panel .meta { font-size: 12px; color: var(--ink-soft); margin: 0 0 14px; }
  .info-panel p.desc { font-size: 14px; line-height: 1.65; margin: 0 0 16px; color: var(--ink); flex: 1; }
  .info-panel a.more {
    font-size: 13px;
    font-weight: 600;
    color: var(--brick);
    text-decoration: none;
    align-self: flex-start;
  }
  .info-panel a.more:hover { text-decoration: underline; }

  .filters {
    max-width: 1000px;
    margin: 0 auto;
    padding: 28px 24px 4px;
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    align-items: center;
  }
  input[type="text"] {
    height: 40px;
    flex: 1 1 220px;
    min-width: 180px;
    border-radius: 3px;
    border: 1px solid var(--line);
    background: var(--paper-deep);
    padding: 0 14px;
    font-size: 14px;
    font-family: inherit;
    color: var(--ink);
  }

  main.grid {
    max-width: 1000px;
    margin: 0 auto;
    padding: 20px 24px 70px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 18px;
  }

  @media (max-width: 640px) {
    .map-wrap { height: 320px; min-width: 0; flex-basis: 100%; }
    .info-panel { min-width: 0; flex-basis: 100%; }
  }
</style>
</head>
<body>

<header class="hero">
  <p class="eyebrow">Навигатор по Подмосковью</p>
  <h1>Усадьбы Москвы и области</h1>
  <p class="tagline">Дворцы, парки и литературные гнёзда в часе езды от города — с историей каждого места и картой, по которой можно проложить свой маршрут</p>
  <div class="flourish">
    <span></span>
    <svg viewBox="0 0 10 10"><rect x="3" y="3" width="4" height="4" transform="rotate(45 5 5)" fill="#A2472E"/></svg>
    <span></span>
  </div>
</header>

<section class="map-section">
  <div class="map-wrap" id="mapWrap">
    <svg viewBox="0 0 460 440" style="position:absolute; inset:0; width:100%; height:100%;" aria-hidden="true">
      <rect x="8" y="8" width="444" height="424" fill="none" stroke="#A2472E" stroke-width="1.5"/>
      <rect x="14" y="14" width="432" height="412" fill="none" stroke="#2C3A24" stroke-width="0.5"/>

      <g fill="none" stroke="#D9C99A" stroke-width="1">
        <circle cx="230" cy="220" r="75"/>
        <circle cx="230" cy="220" r="123"/>
        <circle cx="230" cy="220" r="174"/>
        <circle cx="230" cy="220" r="213"/>
      </g>

      <g stroke="#D9C99A" stroke-width="0.6" stroke-dasharray="1,4">
        <line x1="230" y1="7" x2="230" y2="433"/>
        <line x1="17" y1="220" x2="443" y2="220"/>
        <line x1="79" y1="69" x2="381" y2="371"/>
        <line x1="79" y1="371" x2="381" y2="69"/>
      </g>

      <g font-family="PT Serif, serif" font-size="11" fill="#8A8071" font-style="italic">
        <text x="245" y="149">в черте города</text>
        <text x="245" y="101">≈ 40 км</text>
        <text x="245" y="50">≈ 80 км</text>
        <text x="245" y="12">100+ км</text>
      </g>

      <g font-family="PT Serif, serif" font-size="12" font-weight="bold" fill="#A2472E">
        <text x="230" y="24" text-anchor="middle">С</text>
        <text x="368" y="86">СВ</text>
        <text x="425" y="224">В</text>
        <text x="368" y="362">ЮВ</text>
        <text x="230" y="418" text-anchor="middle">Ю</text>
        <text x="92" y="362">ЮЗ</text>
        <text x="35" y="224">З</text>
        <text x="92" y="86">СЗ</text>
      </g>

      <rect x="226" y="216" width="8" height="8" fill="#2C3A24"/>
      <text x="235" y="230" font-family="PT Serif, serif" font-size="11" fill="#2C3A24">Москва</text>
    </svg>
    <div id="pins"></div>
  </div>
  <div class="info-panel" id="infoPanel"></div>
</section>

<section class="filters">
  <input type="text" id="search" placeholder="Поиск по названию">
  <div class="chips" id="chips"></div>
</section>

<main class="grid" id="grid"></main>

<footer>Навигатор по усадьбам Москвы и области · в разработке</footer>

<script>
  let estates = [];
  const cats = ["Все", "Дворцы", "Парки", "Литературные", "Редкие"];
  let filter = "Все";
  let query = "";
  let active = 0;

  function matches(e) {
    return (filter === "Все" || e.cat === filter) && e.name.toLowerCase().includes(query.toLowerCase());
  }

  function renderPins() {
    document.getElementById("pins").innerHTML = estates.map((e, i) => `
      <button class="pin ${i === active ? "active" : ""} ${matches(e) ? "" : "dim"}" data-i="${i}" style="left:${e.x}%; top:${e.y}%;" aria-label="${e.name}">
        <span class="dot"></span>
        <span class="label">${e.name}</span>
      </button>
    `).join("");
    document.querySelectorAll(".pin").forEach(b =>
      b.addEventListener("click", () => { active = parseInt(b.dataset.i); renderPins(); renderPanel(); })
    );
  }

  function renderPanel() {
    const e = estates[active];
    if (!e) return;
    document.getElementById("infoPanel").innerHTML = `
      <span class="badge">${e.cat}</span>
      <h3>${e.name}</h3>
      <p class="meta">${e.meta}</p>
      <p class="desc">${e.teaser}</p>
      <a class="more" href="usadba.html?slug=${e.slug}">Читать полностью →</a>
    `;
  }

  function renderChips() {
    document.getElementById("chips").innerHTML = cats.map(c =>
      `<button class="chip ${c === filter ? "active" : ""}" data-c="${c}">${c}</button>`
    ).join("");
    document.querySelectorAll(".chip").forEach(b =>
      b.addEventListener("click", () => { filter = b.dataset.c; renderAll(); })
    );
  }

  function renderGrid() {
    const list = estates.filter(matches);
    document.getElementById("grid").innerHTML = list.map(e => `
      <a class="card" href="usadba.html?slug=${e.slug}">
        <div class="photo">
          <img src="images/${e.slug}.jpg" alt="${e.name}" loading="lazy" onerror="this.style.display='none'">
          <span class="ph-text">фото усадьбы</span>
        </div>
        <div class="body">
          <p class="cat">${e.cat}</p>
          <h3>${e.name}</h3>
          <p class="meta">${e.meta}</p>
          <p class="teaser">${e.teaser}</p>
        </div>
      </a>
    `).join("") || `<p style="color:var(--ink-soft); font-size:14px;">Ничего не найдено</p>`;
  }

  function renderAll() {
    renderChips();
    renderPins();
    renderPanel();
    renderGrid();
  }

  document.getElementById("search").addEventListener("input", e => {
    query = e.target.value;
    renderAll();
  });

  fetch("estates.json")
    .then(r => r.json())
    .then(data => { estates = data; renderAll(); })
    .catch(() => {
      document.getElementById("grid").innerHTML =
        `<p style="color:var(--brick); font-size:14px;">Не удалось загрузить данные усадеб (estates.json). Проверьте, что файл лежит рядом с index.html.</p>`;
    });
</script>

</body>
</html>
